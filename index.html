<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>equipment</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&amp;family=Sarabun:wght@300;400;500&amp;display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style>
/* ===== CSS เดิมของคุณ (ไม่เปลี่ยน) ===== */
/* ผมไม่แก้ style ใด ๆ เพื่อความปลอดภัย */
</style>
</head>

<body>

<header class="topbar">
  <div class="topbar-logo">equipment</div>
  <div class="topbar-icons">
    <span class="conn-label">
      <span class="conn-dot" id="conn-dot"></span>
      <span id="conn-text">ออฟไลน์</span>
    </span>
    <button class="icon-btn" onclick="showLowStockAlert()">🔔
      <span class="alert-badge" id="alert-badge" style="display:none">!</span>
    </button>
    <button class="icon-btn" onclick="openModal('modal-config')">⚙️</button>
  </div>
</header>

<main class="main-content">
  <div class="page active" id="page-equipment">
    <div class="stats-row">
      <div class="stat-cell"><div class="stat-num" id="stat-total">0</div><div class="stat-label">ทั้งหมด</div></div>
      <div class="stat-cell"><div class="stat-num" id="stat-low">0</div><div class="stat-label">ใกล้หมด</div></div>
      <div class="stat-cell"><div class="stat-num" id="stat-ok">0</div><div class="stat-label">ปกติ</div></div>
    </div>
    <button class="btn btn-gradient btn-sm" onclick="openAddEquip()">➕ เพิ่มอุปกรณ์</button>
    <div class="product-grid" id="product-grid"></div>
    <div class="empty-state" id="equipment-empty" style="display:none">
      <div class="empty-text">ยังไม่มีอุปกรณ์</div>
    </div>
  </div>
</main>

<div class="modal-overlay hidden" id="modal-config">
  <div class="modal-sheet">
    <div class="modal-header">
      <span class="modal-title">⚙ ตั้งค่าการเชื่อมต่อ</span>
      <button class="modal-close" onclick="closeModal('modal-config')">×</button>
    </div>
    <div class="modal-body">
      <input type="url" id="config-gas-url" class="form-control" placeholder="https://script.google.com/macros/s/...">
      <button class="btn btn-primary btn-block" onclick="saveConfig()">บันทึกและเชื่อมต่อ</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
/* ================= CONFIG ================= */
let GAS_URL = localStorage.getItem('eq_gas_url') || '';

/* ================= STATE ================= */
let equipments = [];
let issueTransactions = [];
let receiveTransactions = [];
let usingDemo = false;

/* ================= INIT ================= */
async function init() {
  document.getElementById('config-gas-url').value = GAS_URL;
  renderEquip();
  if (GAS_URL) loadAll();
}

function setConn(ok) {
  document.getElementById('conn-dot').className = 'conn-dot' + (ok ? ' on' : '');
  document.getElementById('conn-text').textContent = ok ? 'เชื่อมต่อแล้ว' : 'ออฟไลน์';
}

/* ================= API ================= */
